<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="main">
    <div class="card">

        <h2>Create Account</h2>
        <p class="subtitle">Register to get started</p>

        <form id="regForm">

            <div class="input-box">
                <input type="text" id="fname" placeholder="First Name">
                <span class="error" id="fnameErr"></span>
            </div>

            <div class="input-box">
                <input type="text" id="lname" placeholder="Last Name">
                <span class="error" id="lnameErr"></span>
            </div>

            <div class="input-box">
                <input type="text" id="email" placeholder="Email Address">
                <span class="error" id="emailErr"></span>
            </div>

            <div class="input-box">
                <input type="password" id="password" placeholder="Password">
                <span class="error" id="passwordErr"></span>
            </div>

            <div class="input-box">
                <input type="password" id="confirmPassword" placeholder="Confirm Password">
                <span class="error" id="confirmErr"></span>
            </div>

            <div class="input-box">
                <input type="date" id="dob">
                <span class="error" id="dobErr"></span>
            </div>

            <div class="input-box">
                <select id="gender">
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
                <span class="error" id="genderErr"></span>
            </div>

            <div class="input-box">
                <input type="text" id="contact" placeholder="Contact Number">
                <span class="error" id="contactErr"></span>
            </div>

            <button type="submit">Submit</button>

            <p id="successMsg" class="success"></p>

        </form>

    </div>
</div>

<script src="../javascript/script.js"></script>
</body>
</html>
